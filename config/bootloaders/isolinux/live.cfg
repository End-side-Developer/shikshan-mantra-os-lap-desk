# config/bootloaders/isolinux/live.cfg
#
# Shikshan Mantra OS - syslinux (BIOS) live boot menu entries.
# Picked up automatically by live-build (it overrides the built-in
# /usr/share/live/build/bootloaders/isolinux/live.cfg with files
# under config/bootloaders/isolinux/).
#
# Edits to this file require the touches-bootloader label and an
# ADR - see docs/adr/0010-bootloader-visual-identity.md.

include menu.cfg
default vesamenu.c32
prompt 0
timeout 50

menu hshift 0
menu vshift 0
menu margin 5
menu rows 6
menu helpmsgrow 14
menu cmdlinerow 16

label live-amd64
    menu label ^Shikshan Mantra OS (Live)
    menu default
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live components quiet splash hostname=shikshan username=student locales=en_IN.UTF-8 keyboard-layouts=us

label live-amd64-failsafe
    menu label Shikshan Mantra OS (^fail-safe)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live components nopersistent noeject ip=frommedia vga=normal
