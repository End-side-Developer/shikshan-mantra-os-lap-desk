# config/bootloaders/isolinux/isolinux.cfg
#
# Top-level isolinux configuration for Shikshan Mantra OS BIOS boot.
# Loaded by isolinux.bin at first sector; chains to vesamenu.c32 for
# the menu and into live.cfg for the actual boot entries.

ui vesamenu.c32
include menu.cfg
include live.cfg

prompt 0
timeout 50
default vesamenu.c32
