# config/bootloaders/grub-pc/config.cfg
#
# Shikshan Mantra OS - GRUB-EFI menu entries (UEFI boot path).
# Picked up automatically by live-build (overrides
# /usr/share/live/build/bootloaders/grub-pc/config.cfg).
#
# Theme loaded from /boot/grub/theme/theme.txt at boot. See
# config/bootloaders/grub-pc/theme/theme.txt.
#
# Edits to this file require the touches-bootloader label and an
# ADR - see docs/adr/0010-bootloader-visual-identity.md.

set timeout=5
set default=0

if loadfont $prefix/font.pf2 ; then
    set gfxmode=auto
    insmod efi_gop
    insmod efi_uga
    insmod gfxterm
    insmod png
    terminal_output gfxterm
fi

if [ -e $prefix/theme/theme.txt ]; then
    set theme=$prefix/theme/theme.txt
    export theme
fi

menuentry "Shikshan Mantra OS" {
    linux  /live/vmlinuz boot=live components quiet splash hostname=shikshan username=student locales=en_IN.UTF-8 keyboard-layouts=us
    initrd /live/initrd.img
}

menuentry "Shikshan Mantra OS (fail-safe)" {
    linux  /live/vmlinuz boot=live components nopersistent noeject ip=frommedia vga=normal
    initrd /live/initrd.img
}
