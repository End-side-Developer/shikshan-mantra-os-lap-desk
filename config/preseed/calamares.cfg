# config/preseed/calamares.cfg
#
# Calamares preseed for live-to-disk install. Read by Calamares from
# /etc/calamares/branding/shikshan/ at install time.
#
# Defaults map to PLAN.md "Install" section — user creation, locale,
# partitioning (LUKS persistence if admin policy required it).

# Branding name maps to /etc/calamares/branding/shikshan/branding.desc
# which we'll add in a Phase-8 follow-up task (SMO-0060).

calamares:
  branding: shikshan
  sequence:
    show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
    exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - grubcfg
      - bootloader
      - umount
    show:
      - finished

modules-search:
  - local

# Default policy: persistence partition LUKS-encrypted (overridable by admin).
partition:
  efi: 300MiB
  swap: 1GiB
  root: remaining
  encrypt: true

users:
  default-username: student
  shell: /bin/bash
  groups:
    - audio
    - video
    - plugdev
    - netdev

locale:
  default: en_IN.UTF-8
  also-available:
    - hi_IN.UTF-8
