; /etc/xdg/lxqt/lxqt-leave.conf
; Shikshan Mantra OS logout splash configuration. ADR-0009 / SMO-0408.

[General]
defaultAction=Logout
confirmAction=true
hideLogout=false
hideReboot=false
hideShutdown=false
hideSuspend=false
hideHibernate=true
hideLockScreen=true

[Style]
; Stylesheet shipped by scripts/build/sync-ui-to-iso.sh (SMO-0404).
; Applied at lxqt-leave startup via the standard Qt QSS loader.
stylesheet=/usr/share/shikshan/themes/shikshan-light/lxqt-leave.qss
