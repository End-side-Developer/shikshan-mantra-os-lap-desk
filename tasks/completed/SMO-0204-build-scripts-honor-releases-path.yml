---
# tasks/open/SMO-0204-build-scripts-honor-releases-path.yml
#
# Phase-2 capstone: update sbom-generate.sh and verify-iso.sh to use the
# canonical releases/ output path defined by ADR-0006 and SMO-0202.

id: SMO-0204
title: "Update sbom-generate.sh and verify-iso.sh to honor releases/ output path"
type: build-config
linked_adr: "docs/adr/0006-release-artifact-layout.md"
agent: claude-code

I:
  files_in_scope:
    - "scripts/build/sbom-generate.sh"
    - "scripts/verify/verify-iso.sh"
    - "tests/integration/test_release_bundle_layout.sh"
  context_docs:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "docs/adr/0006-release-artifact-layout.md"
    - "releases/README.md"
    - "scripts/build/build-iso.sh"
    - "scripts/build/sbom-generate.sh"
    - "scripts/verify/verify-iso.sh"
    - "scripts/verify/verify-manifests.sh"
  inputs:
    output_dir_env_var: "RELEASES_DIR"
    output_dir_default: "releases"
    bundle_naming: "shikshan-mantra-os-<version>-<arch>.<ext>"

O:
  pr_url: null
  tests_added:
    - "tests/integration/test_release_bundle_layout.sh"
  coverage_delta: 0.3
  sbom_diff: null
  artifacts: []

S:
  - "scripts/build/sbom-generate.sh writes its outputs to ${RELEASES_DIR:-releases}/ (CycloneDX + SPDX) instead of any prior path (artifacts/, ./, etc.)"
  - "scripts/build/sbom-generate.sh accepts an ISO path as $1 and derives the output basename from `shikshan-mantra-os-<version>-<arch>` extracted from the ISO filename"
  - "scripts/verify/verify-iso.sh accepts a path that may be either `releases/<file>.iso` or a bare filename (it then resolves under ${RELEASES_DIR:-releases}/)"
  - "scripts/verify/verify-iso.sh reads the companion *.sha256 and *.sha512 next to the ISO, and asserts both checksums match"
  - "scripts/verify/verify-iso.sh exits non-zero if any companion artifact is missing (sha256, sha512, cdx.json, spdx.json, intoto.jsonl, intoto.jsonl.sig, MANIFEST.txt)"
  - "Both scripts pass `shellcheck` with no new warnings"
  - "tests/integration/test_release_bundle_layout.sh creates a fixture bundle in a temp dir, runs verify-iso.sh, and asserts exit 0; then deletes one companion and asserts non-zero exit"
  - "Backwards-compat: if scripts/build/sbom-generate.sh previously wrote to a different location, the old behavior is removed (no fallback) — note the breaking change in the PR body"
  - "All required-status-checks pass on the PR"

R:
  max_tokens: 200000
  max_wall_minutes: 60
  max_files_changed: 3
  max_diff_lines: 400

T:
  stale_after_hours: 72

preconditions:
  - "SMO-0200 (allowlist for scripts/verify/verify-iso.sh + releases/**) merged on main"
  - "SMO-0201 (ADR-0006) merged on main"
  - "SMO-0202 (releases/README.md) merged on main"
  - "no path in I.files_in_scope intersects policies/protected-paths.yml#deny"

recovery:
  on_budget_exceeded: "move to blocked/ with label needs-human"
  on_protected_path_hit: "abort, write incident to audit, ping CODEOWNERS"
  on_test_failure_after_2_attempts: "open draft PR, label needs-help"
  escalation_contacts:
    - "shikshan/release-managers"
    - "shikshan/devex"

audit:
  claimed_at: null
  claimed_by: null
  first_audit_seq: null
  last_audit_seq: null
