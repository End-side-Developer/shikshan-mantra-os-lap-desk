#
# Phase-3 small-bounded fast-path: 1 file, type=adr, no protected-path overlap.

id: SMO-0401
title: "Write ADR-0009 login surface, branding pipeline, auth contract"
type: adr
linked_adr: "docs/adr/0009-login-branding-auth.md"
agent: claude-code

I:
  files_in_scope:
    - "docs/adr/0009-login-branding-auth.md"
  context_docs:
