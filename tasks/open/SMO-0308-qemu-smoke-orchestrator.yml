  - "run-smoke.sh writes a single timestamped log dir under `${SHIKSHAN_QEMU_LOG_DIR:-tests/qemu/logs}/run-<UTC-ISO8601>/` containing `bios.log` and `uefi.log`"
  - "run-smoke.sh emits a JUnit-XML file `${SHIKSHAN_QEMU_LOG_DIR:-tests/qemu/logs}/run-<UTC-ISO8601>/junit.xml` with one testcase per matrix entry, status pass/fail, captured stdout in <system-out>"
  - "run-smoke.sh exit code is 0 only if both legs exit 0; otherwise propagates the first non-zero leg's exit code"
  - "run-smoke.sh passes `shellcheck`"
  - "tests/integration/test_qemu_run_smoke_xml.sh stubs boot-bios.sh and boot-uefi.sh via PATH-prepend with deterministic pass/fail combos, asserts: both-pass -> junit.xml has 2 passing testcases and script exits 0; bios-fail-uefi-pass -> junit.xml has 1 failing 1 passing and script exits non-zero"
  - "tests/qemu/README.md table adds the row `run-smoke.sh | e2e / qemu-smoke | Orchestrates BIOS + UEFI and emits JUnit XML`"
  - "All required-status-checks pass on the PR"

