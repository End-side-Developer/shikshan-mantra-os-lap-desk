---
# tasks/open/SMO-0504-adr-sandbox-primitive.yml
#
# Locks bubblewrap + a seccomp allow-list as the sandbox primitive for
# Vidyarthi engine subprocesses. Required before SMO-0570 may claim.

id: SMO-0504
title: "Write ADR-0015 sandbox primitive: bubblewrap + seccomp"
type: adr
linked_adr: "docs/adr/0015-sandbox-primitive.md"
agent: claude-code

I:
  files_in_scope:
    - "docs/adr/0015-sandbox-primitive.md"
  context_docs:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "PLAN.md"
    - "docs/adr/0000-template.md"
    - "docs/adr/0011-engine-ipc.md"
  inputs:
    adr_number: "0015"
    slug: "sandbox-primitive"
    locked_decision: "Every Vidyarthi engine subprocess is launched inside a bubblewrap (bwrap) container with: a fresh user namespace, a tmpfs /tmp, a read-only bind of the engine's bundle directory, a tmpfs for the working dir, --unshare-all by default with --share-net OFF, /proc and /dev/null mounted, and a seccomp BPF filter loaded from a per-engine JSON allow-list. Filesystem writes outside the working tmpfs MUST fail. Network MUST fail. fork/exec MUST fail (engines are single-process by design)."
    rejected_alternatives:
      - "firejail: setuid binary, larger attack surface; CVE history on the setuid wrapper itself; not the right shape for child-of-frontend usage"
      - "nsjail: another userspace dependency, no real win over bwrap which is already in Debian and required by Flatpak runtime"
      - "systemd-nspawn: requires root or DynamicUser, container-management semantics overshoot per-exercise lifetime"
      - "Pure seccomp without namespaces: filesystem isolation is impossible with seccomp alone; bwrap supplies the namespace primitive"
      - "Docker / podman: adds a daemon (Docker) or rootless overhead (podman) plus image management story that we don't need for short-lived processes"

O:
  pr_url: null
  tests_added: []
  coverage_delta: 0
  sbom_diff: null
  artifacts:
    - "docs/adr/0015-sandbox-primitive.md"

S:
  - "ADR follows docs/adr/0000-template.md (MADR 3.0.0) — frontmatter status=proposed, today's date, decision-makers field equals [\"@shikshan/platform\"]"
  - "Context section explains why a sandbox primitive must be locked now (engines will execute learner code, including SQL and eventually Python)"
  - "Considered Options section enumerates at least 3 alternatives from inputs.rejected_alternatives with rationale"
  - "Decision Outcome reproduces the bwrap argument set from inputs.locked_decision verbatim"
  - "Decision Outcome documents the seccomp JSON format (one allow-list per engine, default-deny, syscall name + arg-filter optional)"
  - "Consequences section has at least 4 bullets covering: defense-in-depth with ADR-0011 subprocess boundary, debugging cost (strace inside bwrap), per-engine policy cost, no-network is non-negotiable for v1"
  - "Confirmation section names tests/engines/test_sql_sandbox_escape.sh (SMO-0570) as the validator — it MUST verify file-write outside bundle fails, net access fails, fork fails"
  - "Rollback plan paragraph describes how to revert (supersede ADR-0015; remove sandbox.bwrap + seccomp.json from each engine; would require security review)"
  - "ADR cross-references SMO-0570 (SQL engine sandbox profile), SMO-0520 (policy-gated content types reference sandbox via safety_mode), SMO-0515 (CTF schema requires strict sandbox)"

R:
  max_tokens: 80000
  max_wall_minutes: 30
  max_files_changed: 1
  max_diff_lines: 200

T:
  stale_after_hours: 72

preconditions:
  - "SMO-0500 (ADR-0011) is on main — the subprocess boundary this sandbox wraps"
  - "docs/adr/0000-template.md exists on main"
  - "ADR number 0015 not yet allocated on main"
  - "no path in I.files_in_scope intersects policies/protected-paths.yml#deny"

recovery:
  on_budget_exceeded: "move to blocked/ with label needs-human"
  on_protected_path_hit: "abort, write incident to audit, ping CODEOWNERS"
  on_test_failure_after_2_attempts: "open draft PR, label needs-help"
  escalation_contacts:
    - "shikshan/platform"

audit:
  first_audit_seq: null
  last_audit_seq: null
