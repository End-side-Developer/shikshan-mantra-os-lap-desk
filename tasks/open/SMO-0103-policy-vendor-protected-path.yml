---
# tasks/open/SMO-0103-policy-vendor-protected-path.yml
#
# Phase-1: HUMAN-only override PR.
# Adds vendor/** to deny, vendor/MANIFEST.yml to allow, vendor-pin-update
# label definition, and the .gitignore re-include rules for vendor.
#
# This task is `agent: human` because policy files are deny-listed.
# Token budget enforcement does not apply to human-authored PRs; rulesets +
# CODEOWNERS govern instead.

id: SMO-0103
title: "Add vendor/** deny + MANIFEST allow + vendor-pin-update label + .gitignore rules"
type: adr
linked_adr: "docs/adr/0003-vendor-strategy.md"
agent: human

I:
  files_in_scope:
    - "policies/protected-paths.yml"
    - "policies/agent-allowlist.yml"
    - "policies/sensitive-change-labels.yml"
    - ".gitignore"
    - "tests/policy/test_protected_paths_vendor.py"
  context_docs:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "docs/adr/0003-vendor-strategy.md"
    - "policies/protected-paths.yml"
    - "policies/agent-allowlist.yml"
    - "policies/sensitive-change-labels.yml"
  inputs:
    new_deny_glob: "vendor/**"
    new_allow_glob: "vendor/MANIFEST.yml"
    new_label: "vendor-pin-update"
    new_label_requires: "[two-person, team:security]"

O:
  pr_url: null
  tests_added:
    - "tests/policy/test_protected_paths_vendor.py"
  coverage_delta: 0.1
  sbom_diff: null
  artifacts: []

S:
  - "policies/protected-paths.yml deny: contains `vendor/**`"
  - "policies/agent-allowlist.yml allow: contains `vendor/MANIFEST.yml` and excludes any other vendor path"
  - "policies/sensitive-change-labels.yml defines label `vendor-pin-update` requiring [two-person, team:security]"
  - ".gitignore contains `vendor/*` with explicit re-includes `!vendor/MANIFEST.yml`, `!vendor/README.md`, `!vendor/.gitkeep`"
  - "tests/policy/test_protected_paths_vendor.py asserts the deny + allow combination resolves correctly under check-protected-paths.py logic"
  - "PR carries labels `allowlist-override` AND `touches-policy`"
  - "PR has 2 distinct human reviewers from 2 distinct CODEOWNERS teams (governance + security)"
  - "Override entry written to docs/audit/audit.db with action=override on merge"

R:
  max_tokens: 100000
  max_wall_minutes: 60
  max_files_changed: 5
  max_diff_lines: 200

T:
  stale_after_hours: 168

preconditions:
  - "SMO-0101 (ADR-0003) is merged on main"
  - "PR opener applies labels `allowlist-override` and `touches-policy` at PR-open time"
  - "Two CODEOWNERS teams (governance + security) acknowledge override per policies/protected-paths.yml#sensitive_codeowners_teams"
  - "audit chain verifies clean (verify-chain.py exit 0)"

recovery:
  on_budget_exceeded: "move to blocked/ with label needs-human"
  on_protected_path_hit: "abort, write incident to audit, ping CODEOWNERS"
  on_test_failure_after_2_attempts: "open draft PR, label needs-help"
  escalation_contacts:
    - "shikshan/governance"
    - "shikshan/security"

audit:
  claimed_at: null
  claimed_by: null
  first_audit_seq: null
  last_audit_seq: null
