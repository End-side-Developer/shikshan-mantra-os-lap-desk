S:
  - "Runbook documents prerequisites for Linux (apt: live-build, qemu-system-x86, ovmf, docker.io OR podman) and the equivalent for Windows 11 (WSL2 with Ubuntu 22.04, Docker Desktop with WSL integration, qemu-system-x86 inside WSL2)"
  - "Runbook documents the canonical command sequence: clone -> `git checkout main` -> `bash scripts/build/build-iso.sh` -> `bash scripts/verify/verify-iso.sh releases/<bundle>.iso` -> `bash tests/qemu/run-smoke.sh <bundle>.iso`"
  - "Runbook documents at least 5 troubleshooting entries: (1) Docker Desktop not running, (2) WSL2 missing nested virtualisation for QEMU, (3) snapshot.debian.org pin stale, (4) lintian E: tag, (5) OVMF firmware path different on WSL2 Ubuntu"
  - "Runbook explicitly notes that hyper-v + WSL2 nested virt is required for KVM acceleration; on systems without it, QEMU falls back to TCG and BIOS+UEFI smokes can exceed the 540s ADR-0008 deadline"
  - "Runbook references ADR-0006, ADR-0007, ADR-0008 by relative path"
  - "Runbook references .claude/skills/iso-build/SKILL.md as the agent-facing companion"
  - "Runbook starts with a 'When to use' section and ends with a 'Forbidden' section mirroring SKILL.md"
  - "Runbook is markdownlint-clean (no MD line-length warnings; uses ATX headings)"
  - "All required-status-checks pass on the PR"

