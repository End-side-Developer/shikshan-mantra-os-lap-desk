---
# tasks/open/SMO-0806-code-engine-tests.yml
#
# pytest suite for the Python code engine: JSON-RPC lifecycle, correct/wrong
# submission, timeout, SyntaxError, shutdown. Mirrors tests/engines/test_sql_engine.py.

id: SMO-0806
title: "tests/engines/test_code_engine.py: JSON-RPC lifecycle tests for Python code engine"
type: tests
linked_adr: "docs/adr/0019-code-engine-runtime.md"
agent: claude-code

I:
  files_in_scope:
    - "tests/engines/test_code_engine.py"
  context_docs:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "docs/adr/0011-engine-ipc.md"
    - "docs/adr/0019-code-engine-runtime.md"
    - "docs/architecture/vidyarthi-engine-rpc.md"
    - "tests/engines/test_sql_engine.py"
    - "config/includes.chroot/usr/share/shikshan/vidyarthi/engines/code/main.py"
    - "modules/core/python-basics/content/exercises/01-hello.yml"
  inputs:
    test_cases_required:
      - name: "test_init_handshake"
        desc: "send init RPC, assert result.engine_id == 'code'"
      - name: "test_load_exercise_hello_world"
        desc: "send load_exercise for 01-hello.yml, assert result.exercise_id == 'hello-world'"
      - name: "test_grade_correct_submission"
        desc: "load hello-world, grade with 'print(\"Hello, World!\")', assert score=1 success=True"
      - name: "test_grade_wrong_output"
        desc: "load hello-world, grade with 'print(\"Hi\")', assert score=0 success=False"
      - name: "test_grade_syntax_error"
        desc: "load hello-world, grade with 'print(\"Hello, World!\"', assert score=0, feedback.en contains 'SyntaxError'"
      - name: "test_grade_timeout"
        desc: "load an exercise with max_execution_ms=200, grade with 'import time; time.sleep(60)', assert JSON-RPC error -32003"
      - name: "test_run_method_not_found"
        desc: "send run RPC, assert error code -32601"
      - name: "test_shutdown"
        desc: "send shutdown RPC, assert process exits within 5 seconds"
      - name: "test_load_missing_exercise"
        desc: "load nonexistent exercise id, assert JSON-RPC error -32002"
      - name: "test_grade_even_or_odd_correct"
        desc: "load 02-conditionals, grade with correct solution for input=4, assert score=1"
    test_structure: >
      Mirror tests/engines/test_sql_engine.py exactly:
      - fixture `engine` that spawns engines/code/main.py as subprocess, sends init,
        yields the process + send/recv helpers, sends shutdown in teardown
      - helper send_rpc(proc, method, params) / recv_rpc(proc) using newline-delimited JSON
      - skip all tests if sys.platform != 'linux' and VIDYARTHI_SANDBOX=auto
        (or skip sandbox-specific tests only, matching how sql test handles Windows)
      - tests are runnable on Windows without sandbox: subprocess.run without bwrap

O:
  pr_url: null
  tests_added:
    - "tests/engines/test_code_engine.py"
  coverage_delta: 0
  sbom_diff: null
  artifacts:
    - "tests/engines/test_code_engine.py"

S:
  - "tests/engines/test_code_engine.py exists and is pytest-compatible"
  - "python -m pytest tests/engines/test_code_engine.py -v exits 0 on Windows (sandbox tests skipped if not Linux)"
  - "All 10 test cases listed in inputs.test_cases_required are present"
  - "test_grade_correct_submission asserts score=1 and success=True"
  - "test_grade_wrong_output asserts score=0 and success=False"
  - "test_grade_syntax_error asserts score=0 and feedback['en'] contains 'SyntaxError'"
  - "test_grade_timeout asserts error code -32003 in the JSON-RPC response"
  - "test_shutdown asserts subprocess exits within 5 seconds of shutdown RPC"
  - "pre-commit passes (SKIP list per CLAUDE.md Phase-3)"

R:
  max_tokens: 80000
  max_wall_minutes: 35
  max_files_changed: 1
  max_diff_lines: 220

T:
  stale_after_hours: 72

preconditions:
  - "SMO-0801 (engines/code/main.py) is on main"
  - "SMO-0803 (python-basics exercises) is on main — test loads 01-hello.yml and 02-conditionals.yml"
  - "no path in I.files_in_scope intersects policies/protected-paths.yml#deny"

recovery:
  on_budget_exceeded: "move to blocked/ with label needs-human"
  on_protected_path_hit: "abort, write incident to audit, ping CODEOWNERS"
  on_test_failure_after_2_attempts: "open draft PR, label needs-help"
  escalation_contacts:
    - "shikshan/platform"

audit:
  first_audit_seq: null
  last_audit_seq: null
