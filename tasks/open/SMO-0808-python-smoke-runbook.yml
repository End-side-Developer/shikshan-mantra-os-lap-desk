      - "Step 9 — Verify xAPI: open terminal, run sqlite3 command to check learner.db"
      - "Step 10 — Optional: test even-or-odd and sum-to-n exercises"
      - "Troubleshooting: engine not found (check sub_engine in manifest), timeout error (check max_execution_ms), no xAPI row (check learner.db path)"
    mirror_of: "docs/runbooks/vidyarthi-sql-smoke.md — follow same structure, adjust module name, exercise names, submission code"

