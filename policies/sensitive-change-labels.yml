# policies/sensitive-change-labels.yml
#
# When a PR touches paths matching one of these patterns, .github/labeler.yml
# auto-applies the corresponding label. Labels then drive:
#   - Ruleset `protected-paths.json` to require 2 distinct human reviewers
#   - CODEOWNERS to route to the listed teams
#   - Mergify to refuse queue entry until requirements are satisfied

version: 1

labels:
  - name: touches-bootloader
    paths:
      - "config/bootloaders/**"
      - "auto/**"
    requires:
      - two-person
      - team:security
      - team:platform

  - name: touches-signing
    paths:
      - "config/archives/*.key.*"
      - "config/archives/*.auth.*"
      - "docs/security/signing-policy.md"
      - "scripts/verify/verify-slsa.sh"
    requires:
      - two-person
      - team:security
      - team:release-managers
      - gpg-signed-tag

  - name: touches-policy
    paths:
      - "policies/**"
      - ".github/CODEOWNERS"
      - ".github/rulesets/**"
      - "AGENTS.md"
      - "AGENT_CARD.md"
    requires:
      - two-person
      - team:governance
      - team:security

  - name: touches-ci
    paths:
      - ".github/workflows/**"
      - ".github/mergify.yml"
      - ".github/renovate.json"
      - ".pre-commit-config.yaml"
    requires:
      - two-person
      - team:devex
      - team:security

  - name: touches-audit
    paths:
      - "scripts/audit/**"
      - "docs/audit/**"
    requires:
      - two-person
      - team:security
      - team:governance

  - name: touches-packages
    paths:
      - "config/packages.chroot/**"
    requires:
      - two-person
      - team:security
      - team:platform
      - signed-commit-required

  - name: touches-safety-defaults
    paths:
      - "config/includes.chroot/etc/firefox/policies.json"
      - "config/includes.chroot/etc/shikshan/policy.yml"
      - "config/package-lists/safety-filtering.list.chroot"
    requires:
      - two-person
      - team:safety
      - team:platform
