# vendor/backend/pyproject.toml
#
# Shikshan Mantra OS content backend — phase-1 reference implementation.
# Authoritative decision: docs/adr/0017-content-backend-architecture.md.
# First-party code (NOT a vendored upstream clone); tracked, never built into
# the ISO and not part of the SBOM (ADR-0003 vendor strategy).

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "smo-backend"
version = "0.1.0"
description = "Shikshan Mantra OS content backend — phase-1 /health reference impl (ADR-0017)."
requires-python = ">=3.11"
dependencies = [
    "fastapi==0.136.3",
    "uvicorn[standard]==0.48.0",
]

[project.optional-dependencies]
# Test/dev extra. httpx backs fastapi.testclient.TestClient.
dev = [
    "pytest>=8,<9",
    "httpx>=0.27,<1",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
# Lets `pytest` run from vendor/backend/ with no install step: src/ on the
# import path, tests/ as the only test root.
testpaths = ["tests"]
pythonpath = ["src"]
