# vendor/MANIFEST.yml
#
# Source of truth for manifest-pinned upstream third-party clones.
#
# Authoritative decision: docs/adr/0003-vendor-strategy.md.
# Schema: modules/catalogs/schemas/vendor-manifest.schema.json
#
# Entry shape (schema is authoritative):
#   - name: <slug>                      # filesystem-safe, matches vendor/<name>/
#     upstream_url: <https URL>         # canonical upstream remote
#     pinned_commit: <40-char hex SHA>  # exact upstream commit being pinned
#     license: <SPDX-identifier>        # e.g. "GPL-3.0-or-later"
#     integration_targets:              # repo-relative paths that may receive
#       - <path>                        # copy-with-attribution commits
#     last_synced: <YYYY-MM-DD>         # ISO date of most recent verified sync
#     reviewer_team: <github-team>      # e.g. "@shikshan/security"
#
# Tool: scripts/dev/vendor-sync.py (SMO-0104) consumes this file.
# Commit-trailer convention: every commit that copies bytes from
# vendor/<name>/ into the repo must carry both
#   Source-Upstream: vendor/<name>@<short-SHA>
#   Source-License: <SPDX-identifier>
# trailers. See vendor/README.md for the full convention.

version: 1
