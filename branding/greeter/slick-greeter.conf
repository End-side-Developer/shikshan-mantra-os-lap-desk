; branding/greeter/slick-greeter.conf — installed at /etc/lightdm/slick-greeter.conf
; by config/hooks/live/0031-greeter-theme.hook.chroot. See ADR-0009 and
; branding/greeter/README.md for field reference and fallback behaviour.

[Greeter]
background = /usr/share/backgrounds/shikshan/default.png
background-color = #0E4F88
logo = /usr/share/shikshan/branding/logo/shikshan-mantra.svg
theme-name = Adwaita
icon-theme-name = Adwaita
font-name = Noto Sans 11
draw-user-backgrounds = false
draw-grid = false
show-power = true
show-keyboard = false
show-clock = true
show-quit = true
clock-format = %H:%M
high-contrast = false
play-ready-sound = false
