---
name: "Bug report"
description: "Something doesn't work as documented."
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in every section.
        Do **not** report security vulnerabilities here — see SECURITY.md.

  - type: input
    id: version
    attributes:
      label: Release / commit
      description: "Tag (vX.Y.Z) or commit SHA where you observed the bug"
      placeholder: "v0.1.0 or abcd1234"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      multiple: false
      options:
        - "Live USB boot"
        - "Installed system"
        - "VM / QEMU"
        - "Module launcher"
        - "Kolibri (offline learning)"
        - "Web filtering / safety"
        - "Module catalog / signing"
        - "Build pipeline / live-build"
        - "AI agent governance / audit"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: "Minimum steps to reproduce. Include hardware/VM profile and RAM."
      placeholder: |
        1. Boot artifacts/shikshan.iso in QEMU with 2GB RAM
        2. Open module launcher
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / journalctl output
      description: "Paste under triple-backtick. Redact any PII."
      render: text

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: "I searched existing issues for duplicates"
          required: true
        - label: "This is not a security vulnerability (those go via SECURITY.md)"
          required: true
