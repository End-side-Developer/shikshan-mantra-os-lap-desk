---
# .github/dependabot.yml
#
# Dependabot handles GH Actions pin updates only. Everything else (Python,
# Node lockfiles, container images) goes through Renovate (renovate.json).
# Split is intentional: keep the surface area of each bot small and auditable.

version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - touches-ci
    commit-message:
      prefix: "ci"
      include: scope
    reviewers:
      - "shikshan/devex"
      - "shikshan/security"
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
